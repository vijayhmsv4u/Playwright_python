image: python:3.11

stages:
  - test

cache:
  paths:
    - .cache/pip

before_script:
  - python --version
  - pip install --upgrade pip
  - pip install -r requirements.txt
  - playwright install --with-deps

playwright_tests:
  stage: test
  script:
    - pytest --junitxml=reports/results.xml
  artifacts:
    when: always
    paths:
      - reports/
    expire_in: 1 week