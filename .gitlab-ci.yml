image: mcr.microsoft.com/playwright/python:v1.58.0-jammy

stages:
  - test
  - report

variables:
  CI: "true"

tests:
  stage: test
  script:
    - pip install -r requirements.txt
    - pytest --browser chromium --alluredir=allure-results
  artifacts:
    when: always
    paths:
      - allure-results

allure_report:
  stage: report
  image: frankescobar/allure-docker-service
  script:
    - allure generate allure-results -o allure-report --clean
  artifacts:
    paths:
      - allure-report